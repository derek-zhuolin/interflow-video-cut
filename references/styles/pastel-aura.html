<!--
  Style: pastel-aura (柔和极光) — ivory + aura gradients · serif headlines · white floating cards
  ─────────────────────────────────────────────────────────────────────
  浅色 / 柔和分支：象牙白底 + 极光渐变 + 衬线大标题 + 白色浮卡柔投影。
  适合个人分享、品牌叙事、AI/SaaS 调性。pip 用白描边胶囊；尾卡见 card-cta。

  Tokens
    bg       #FAF7F2   (ivory)
    ink      #1F2433   (dark navy ink — headlines & emphasis)
    ink-soft #6A6E7E   (muted body text)
    gold     #A98F5E   (kicker / accents / diamonds)
    mint     #D6EDDD   (aura gradient 1 + highlight under keywords)
    lavender #DCD3F2   (aura gradient 2 + highlight under keywords)
    peach    #F7DFD3   (aura gradient 3)
    blue     #D8E4F5   (aura gradient 4, occasional)
  Fonts
    headlines — Georgia, 'Songti SC', 'STSong', 'LXGW WenKai TC', serif (weight 900)
    body / kicker — 'Inter', ui-sans-serif, "PingFang SC", sans-serif
  Signature moves
    - 每张卡的 aura 渐变位置不同（mint/lavender/peach 换角落），全片有流动感
    - 关键词用淡彩色块衬底：box-shadow: inset 0 -Npx 0 rgba(mint/lavender, .8)
    - 白色浮卡：background #fff + box-shadow 0 30px 70px -28px rgba(31,36,51,.28)
    - 深色强调块：background var(--ink) + 白字（每张卡最多一个，做视觉锚点）
    - kicker：gold + uppercase + letter-spacing .32em + 渐变细线 grow-x
  Composition-level（按 SKILL.md Step 9 的 composition 模板自行铺设）
    - 舞台背景也是 aura 渐变（卡片切换时不露黑底）
    - pip 白描边：0 0 0 5px rgba(255,255,255,.95) + 柔投影
    - 字幕：白色圆角胶囊 + 金色菱形前缀 + ink 文字
    - 片尾：fade-to-black overlay 最后 0.5s
  Best with
    layouts: pip (推荐), stack, overlay
    frames:  clean (白描边由 pip CSS 提供，不需要额外 frame)
    content: 个人分享 / 品牌叙事 / AI·SaaS 调性 / 愿景类收尾
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>style · pastel-aura (柔和极光)</title>
<style>
  html, body { margin: 0; padding: 0; background: #e8e6e1;
               font-family: ui-sans-serif, system-ui, sans-serif; }
  .stage { position: relative; width: 1920px; height: 1080px;
           transform-origin: top left; transform: scale(0.5); overflow: hidden; }
  .card-host { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<div class="stage"><div class="card-host">

<div class="card" data-card-id="ref-pastel-aura">
  <style>
    .card[data-card-id="ref-pastel-aura"] .root {
      --ink: #1F2433; --ink-soft: #6A6E7E; --gold: #A98F5E;
      --font-serif: Georgia, 'Songti SC', 'STSong', 'LXGW WenKai TC', serif;
      --font-sans: 'Inter', ui-sans-serif, system-ui, "PingFang SC", "Hiragino Sans GB", sans-serif;
      width: 100%; height: 100%; position: relative; overflow: hidden;
      background:
        radial-gradient(ellipse 52% 64% at 88% 14%, rgba(214,237,221,.85) 0%, transparent 62%),
        radial-gradient(ellipse 48% 60% at 6% 88%, rgba(220,211,242,.75) 0%, transparent 62%),
        radial-gradient(ellipse 40% 50% at 92% 92%, rgba(247,223,211,.65) 0%, transparent 60%),
        #FAF7F2;
      color: var(--ink); font-family: var(--font-sans);
      padding: 64px 80px 150px 80px; box-sizing: border-box;
      display: flex; flex-direction: column;
    }
    /* kicker：金色 + 大字距 + 渐变细线 */
    .card[data-card-id="ref-pastel-aura"] .kicker {
      display: flex; align-items: center; gap: 22px;
      font: 600 22px/1 var(--font-sans); color: var(--gold);
      letter-spacing: .32em; text-transform: uppercase;
    }
    .card[data-card-id="ref-pastel-aura"] .kicker .dim { color: var(--ink-soft); letter-spacing: .2em; }
    .card[data-card-id="ref-pastel-aura"] .kicker-line {
      width: 520px; height: 3px; margin-top: 22px;
      background: linear-gradient(90deg, var(--gold), rgba(169,143,94,.05));
      border-radius: 2px;
    }
    /* 衬线大标题 + 淡彩色块衬关键词 */
    .card[data-card-id="ref-pastel-aura"] .headline {
      margin: auto 0 0 0;
      font: 900 132px/1.2 var(--font-serif);
      color: var(--ink); letter-spacing: -.01em;
    }
    .card[data-card-id="ref-pastel-aura"] .headline .hl-mint {
      box-shadow: inset 0 -26px 0 rgba(214,237,221,.9);
    }
    .card[data-card-id="ref-pastel-aura"] .headline .hl-lav {
      box-shadow: inset 0 -26px 0 rgba(220,211,242,.8);
    }
    .card[data-card-id="ref-pastel-aura"] .headline .bang { color: var(--gold); }
    /* 白色浮卡 chips */
    .card[data-card-id="ref-pastel-aura"] .chips {
      display: flex; align-items: center; gap: 28px;
      margin-top: 64px;
    }
    .card[data-card-id="ref-pastel-aura"] .chip {
      padding: 34px 52px; border-radius: 20px;
      background: #fff;
      box-shadow: 0 30px 70px -28px rgba(31,36,51,.28), 0 0 0 1px rgba(31,36,51,.04);
      font: 800 44px/1 var(--font-serif); color: var(--ink);
    }
    /* 深色锚点块（每卡最多一个） */
    .card[data-card-id="ref-pastel-aura"] .chip.anchor {
      background: var(--ink); color: #FAF7F2;
      box-shadow: 0 36px 80px -28px rgba(31,36,51,.55);
    }
    .card[data-card-id="ref-pastel-aura"] .op {
      font: 300 56px/1 var(--font-sans); color: var(--gold);
    }
    /* 底部 meta 行 */
    .card[data-card-id="ref-pastel-aura"] .meta {
      display: flex; align-items: center; gap: 24px;
      margin-top: auto; padding-top: 32px;
      border-top: 1px solid rgba(31,36,51,.1);
      font: 500 28px/1.6 var(--font-sans); color: var(--ink-soft);
    }
    .card[data-card-id="ref-pastel-aura"] .meta .hl { color: var(--ink); font-weight: 700; }
  </style>

  <div class="root">
    <div class="kicker" data-anim="fade-in" data-anim-at="0.15" data-anim-duration="0.45">
      <span>Reference Card</span><span class="dim">&diams; 柔和极光</span>
    </div>
    <div class="kicker-line"></div>

    <h1 class="headline" data-anim="fade-in" data-anim-at="0.45" data-anim-duration="0.5">
      让表达更加<span class="hl-mint">自由</span><span class="bang">，</span><br/>
      更加<span class="hl-lav">轻松</span>
    </h1>

    <div class="chips" data-anim="fade-in" data-anim-at="1.0" data-anim-duration="0.5">
      <div class="chip anchor">Claude</div>
      <div class="op">+</div>
      <div class="chip">飞书</div>
      <div class="op">+</div>
      <div class="chip">好的 Skill</div>
    </div>

    <div class="meta" data-anim="fade-in" data-anim-at="1.5" data-anim-duration="0.5">
      <span class="hl">这是占位内容</span> ── 复制 tokens 和结构，换成你的真实 takeaway
    </div>
  </div>
</div>

</div></div>
</body>
</html>
