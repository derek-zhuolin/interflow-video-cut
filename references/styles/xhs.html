<!--
  Style: xhs (小红书) — cream + hot pink · chips · #hashtags · ❤️💬 row
  ─────────────────────────────────────────────────────────────────────
  Tokens
    bg     #fff5e9   (warm cream)
    ink    #1d1418
    muted  #8a7a78
    accent #ff2e63   (hot pink — chip + interaction icon)
    accent2#ff8a4c   (orange — tag)
    accent3#f0c419   (yellow — pin)
  Fonts
    headline & body — Noto Sans SC fallback: ui-sans-serif, system-ui, "PingFang SC", sans-serif
  Best with
    layouts: overlay, stack (especially in portrait/9:16)
    frames:  clean, polaroid
    content: 社交剪辑 / 生活方式 / 种草 / 短视频高光
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>style · xhs (小红书)</title>
<style>
  html, body { margin: 0; padding: 0; background: #0a0c12;
               font-family: ui-sans-serif, system-ui, sans-serif; }
  .stage { position: relative; width: 1920px; height: 1080px;
           transform-origin: top left; transform: scale(0.5); overflow: hidden; }
  .card-host { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<div class="stage"><div class="card-host">

<div class="card" data-card-id="ref-xhs">
  <style>
    .card[data-card-id="ref-xhs"] .root {
      --bg: #fff5e9; --ink: #1d1418; --muted: #8a7a78;
      --accent: #ff2e63; --accent2: #ff8a4c; --accent3: #f0c419;
      --font-sans: ui-sans-serif, system-ui, "PingFang SC", "Hiragino Sans GB", sans-serif;

      width: 100%; height: 100%; position: relative; overflow: hidden;
      background: var(--bg); color: var(--ink); font-family: var(--font-sans);
      padding: 36px 44px; box-sizing: border-box;
      display: flex; flex-direction: column; gap: 22px;
    }
    .card[data-card-id="ref-xhs"] .user-row {
      display: flex; align-items: center; gap: 14px;
    }
    .card[data-card-id="ref-xhs"] .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #ff2e63, #ff8a4c);
      box-shadow: 0 0 0 3px #fff, 0 0 0 4px rgba(255,46,99,.3);
    }
    .card[data-card-id="ref-xhs"] .user-info { flex: 1; }
    .card[data-card-id="ref-xhs"] .user-name {
      font: 700 22px/1.1 var(--font-sans); color: var(--ink);
    }
    .card[data-card-id="ref-xhs"] .user-sub {
      font: 400 16px/1.3 var(--font-sans); color: var(--muted);
    }
    .card[data-card-id="ref-xhs"] .follow {
      padding: 8px 20px; border-radius: 999px;
      background: var(--accent); color: #fff;
      font: 700 16px/1 var(--font-sans);
    }
    .card[data-card-id="ref-xhs"] .title {
      margin: 0;
      font: 800 84px/1.1 var(--font-sans);
      color: var(--ink); letter-spacing: -.01em;
    }
    .card[data-card-id="ref-xhs"] .title .heart { color: var(--accent); }
    .card[data-card-id="ref-xhs"] .detail {
      margin: 0; font: 500 28px/1.5 var(--font-sans); color: var(--ink);
      max-width: 94%;
    }
    .card[data-card-id="ref-xhs"] .tags {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .card[data-card-id="ref-xhs"] .tag {
      padding: 8px 18px; border-radius: 999px;
      background: rgba(255,46,99,.12); color: var(--accent);
      font: 600 18px/1 var(--font-sans);
    }
    .card[data-card-id="ref-xhs"] .tag.orange { background: rgba(255,138,76,.16); color: var(--accent2); }
    .card[data-card-id="ref-xhs"] .tag.yellow { background: rgba(240,196,25,.18); color: #a98209; }
    .card[data-card-id="ref-xhs"] .interactions {
      display: flex; gap: 28px; margin-top: auto; padding-top: 14px;
      border-top: 1px solid rgba(0,0,0,.06);
      font: 700 22px/1 var(--font-sans); color: var(--ink);
    }
    .card[data-card-id="ref-xhs"] .interactions .stat { display: inline-flex; align-items: center; gap: 9px; }
    /* SVG icons (not emoji) — render identically in every headless browser */
    .card[data-card-id="ref-xhs"] .interactions svg { width: 26px; height: 26px; display: block; }
    .card[data-card-id="ref-xhs"] .interactions .stat.liked svg { color: var(--accent); }
    .card[data-card-id="ref-xhs"] .interactions .share {
      margin-left: auto; color: var(--muted); font-weight: 400; font-size: 18px;
    }
    .card[data-card-id="ref-xhs"] .interactions .share svg { width: 22px; height: 22px; }
  </style>

  <div class="root">
    <div class="user-row" data-anim="fade-in" data-anim-at="0.05" data-anim-duration="0.4">
      <div class="avatar"></div>
      <div class="user-info">
        <div class="user-name">@小研究员</div>
        <div class="user-sub">关注我，看我每天拆一段视频 · 18分钟前</div>
      </div>
      <div class="follow">+ 关注</div>
    </div>

    <h2 class="title" data-anim="fade-in" data-anim-at="0.3" data-anim-duration="0.5">
      亲测有效！<span class="heart">♥</span> 30 秒抓住注意力的小技巧
    </h2>

    <p class="detail" data-anim="fade-in" data-anim-at="0.7" data-anim-duration="0.45">
      开头别废话——直接抛结论。听众的大脑在前 3 秒就决定要不要继续，
      这是平台算法之外，最朴素也最重要的事实。
    </p>

    <div class="tags" data-anim="fade-in" data-anim-at="1.0" data-anim-duration="0.4">
      <span class="tag">#内容创作</span>
      <span class="tag orange">#播客剪辑</span>
      <span class="tag yellow">#开头技巧</span>
    </div>

    <div class="interactions" data-anim="fade-in" data-anim-at="1.25" data-anim-duration="0.4">
      <span class="stat liked">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 20.5l-1.45-1.32C5.4 14.5 2 11.4 2 7.6 2 4.9 4.1 3 6.6 3c1.5 0 2.9.7 3.4 1.8C10.5 3.7 11.9 3 13.4 3 15.9 3 18 4.9 18 7.6c0 3.8-3.4 6.9-8.55 11.58L12 20.5z"/></svg>
        12.4k
      </span>
      <span class="stat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.5 9 9 0 0 1-3.9-.9L3 21l1.9-5.6a8.4 8.4 0 0 1-.9-3.9A8.5 8.5 0 0 1 12.5 3 8.4 8.4 0 0 1 21 11.5z"/></svg>
        386
      </span>
      <span class="stat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        891
      </span>
      <span class="stat share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M16 6l-4-4-4 4M12 2v13"/></svg>
        分享
      </span>
    </div>
  </div>
</div>

</div></div>
</body>
</html>
